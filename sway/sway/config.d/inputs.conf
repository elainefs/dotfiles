###########################
### Input configuration ###
###########################

# You can get the names of your inputs by running: swaymsg -t get_inputs

# For all inputs
input * {
  xkb_layout "br"
  xkb_variant "abnt2"
  xkb_numlock disabled
}

# Touchpad configuration
input type:touchpad {
  dwt enabled
  tap enabled
  natural_scroll enabled
  middle_emulation enabled
}
