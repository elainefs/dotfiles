####################
### Window rules ###
####################

for_window [app_id="org.gnome.Nautilus"] {
  floating enable
  resize set 1400 850
  move position center
}

for_window [app_id="org.gnome.Software"] {
  floating enable
  resize set 1400 850
  move position center
}

for_window [app_id="org.mozilla.Thunderbird"] {
  floating enable
  resize set 1400 850
  move position center
}

for_window [app_id="btop_float"] {
  floating enable
  resize set 1500 850
  move position center
}

for_window [app_id="pavucontrol"] {
  floating enable
  resize set 800 530
  move position center
}

for_window [app_id="blueman"] {
  floating enable
  resize set 800 530
  move position center
}

for_window [app_id="nm-connection-editor"] {
  floating enable
  resize set 800 530
  move position center
}

for_window [app_id="org.gnome.clocks"] {
  floating enable
  resize set 800 530
  move position center
}

for_window [app_id="org.gnome.Calculator"] {
  floating enable
    resize set 400 600
    move position center
}

for_window [app_id="gnome-pomodoro"] {
  floating enable
    resize set 400 600
    move position center
}
